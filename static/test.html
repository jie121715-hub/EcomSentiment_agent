<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服系统 · Agent 测试面板 v2</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #f1f5f9; --text-muted: #94a3b8; --primary: #6366f1;
    --green: #10b981; --amber: #f59e0b; --red: #ef4444;
    --cyan: #06b6d4; --purple: #8b5cf6; --pink: #ec4899;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px;
  }
  .header .logo { font-size: 22px; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .badge { font-size: 10px; background: #312e81; color: #a5b4fc; padding: 3px 10px; border-radius: 10px; }
  .header .mode-switch { margin-left: auto; display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 3px; }
  .header .mode-btn {
    padding: 6px 14px; border: none; border-radius: 8px; font-size: 12px;
    cursor: pointer; color: var(--text-muted); background: transparent; transition: .2s;
  }
  .header .mode-btn.active { background: var(--primary); color: #fff; }
  .header .status { margin-left: 12px; font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 5px; }
  .header .status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  /* ── Layout ── */
  .main { flex: 1; display: flex; overflow: hidden; }
  .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .debug-panel { width: 360px; background: var(--card); border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }

  /* ── Sidebar: Test Cases ── */
  .sidebar-section { padding: 14px; border-bottom: 1px solid var(--border); }
  .sidebar-section h3 { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; letter-spacing: .5px; }
  .test-case {
    display: block; width: 100%; text-align: left; padding: 9px 12px; margin-bottom: 6px;
    background: var(--bg); border: 1px solid transparent; border-radius: 8px;
    color: var(--text); font-size: 12px; cursor: pointer; transition: .15s; line-height: 1.4;
  }
  .test-case:hover { border-color: var(--primary); }
  .test-case .agent-tag {
    display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 4px; margin-bottom: 3px;
  }
  .tag-qa { background: #064e3b; color: #6ee7b7; }
  .tag-biz { background: #164e63; color: #22d3ee; }
  .tag-chat { background: #4c1d95; color: #c4b5fd; }
  .tag-mgmt { background: #831843; color: #fbcfe8; }

  /* ── Chat Area ── */
  .chat-area { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .msg { display: flex; gap: 10px; margin-bottom: 16px; animation: slide .25s ease; }
  @keyframes slide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .msg.user .avatar { background: var(--primary); }
  .msg.ai .avatar { background: #312e81; }
  .msg .bubble { max-width: 72%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; }
  .msg.user .bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 3px; }
  .msg.ai .bubble { background: var(--bg); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg .meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-tag { padding: 1px 7px; border-radius: 6px; font-weight: 500; }
  .meta-tag.sent { background: #1e3a5f; color: #93c5fd; }
  .meta-tag.intent { background: #1a2e1a; color: #86efac; }
  .meta-tag.time { background: transparent; color: var(--text-muted); }
  .meta-tag.agent { background: #3b1e4a; color: #d8b4fe; }

  .typing { display: flex; gap: 3px; padding: 6px 0; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

  /* ── Input ── */
  .input-area { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .input-area textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 13px; color: var(--text); resize: none; outline: none;
    font-family: inherit; line-height: 1.5; max-height: 100px;
  }
  .input-area textarea:focus { border-color: var(--primary); }
  .input-area button {
    background: var(--primary); color: #fff; border: none; padding: 10px 18px;
    border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: .2s;
    display: flex; align-items: center; gap: 5px;
  }
  .input-area button:hover { opacity: .85; }
  .input-area button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Debug Panel ── */
  .debug-panel { padding: 0; }
  .debug-header { padding: 14px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; }
  .debug-step { padding: 12px 14px; border-bottom: 1px solid rgba(51,65,85,.5); }
  .debug-step .step-title { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .debug-step .step-title .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .debug-step .step-body { font-size: 12px; line-height: 1.7; }
  .debug-step .step-body .kv { display: flex; gap: 6px; }
  .debug-step .step-body .kv .k { color: var(--text-muted); min-width: 55px; flex-shrink: 0; }
  .debug-empty { padding: 30px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .debug-step .flow-arrow { text-align: center; padding: 4px 0; color: var(--primary); font-size: 14px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .debug-panel { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🤖</span>
  <h1>Agent 测试面板<span class="badge">v2 · 6 Agents</span></h1>
  <div class="mode-switch">
    <button class="mode-btn active" onclick="setMode('normal')">常规</button>
    <button class="mode-btn" onclick="setMode('stream')">流式 SSE</button>
  </div>
  <span class="status">API 已连接</span>
</div>

<div class="main">

  <!-- ═══ 左侧：测试用例 ═══ -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>📚 知识应答Agent (KnowledgeQA)</h3>
      <button class="test-case" onclick="test('这件衣服是什么材质？会不会起球？')"><span class="agent-tag tag-qa">RAG+LLM</span><br>商品咨询 — 衣服材质起球</button>
      <button class="test-case" onclick="test('如何申请退货退款？流程是什么样的？')"><span class="agent-tag tag-qa">RAG+LLM</span><br>售后问题 — 退货退款流程</button>
      <button class="test-case" onclick="test('帮我推荐一款2000以内的手机，拍照好的')"><span class="agent-tag tag-qa">RAG+LLM</span><br>求推荐 — 2000元手机</button>
      <button class="test-case" onclick="test('这款防晒霜和那款比哪个更好用？')"><span class="agent-tag tag-qa">RAG+LLM</span><br>商品对比 — 防晒霜</button>
    </div>
    <div class="sidebar-section">
      <h3>📦 业务查询Agent (Business → MySQL)</h3>
      <button class="test-case" onclick="test('帮我查一下JD20240706-001的物流到哪了')"><span class="agent-tag tag-biz">MySQL精确查询</span><br>查物流 — 订单JD20240706-001</button>
      <button class="test-case" onclick="test('看看订单JD20240706-001的详情')"><span class="agent-tag tag-biz">MySQL精确查询</span><br>查订单 — 订单详情</button>
      <button class="test-case" onclick="test('SKU-FS001还有货吗？库存多少？')"><span class="agent-tag tag-biz">MySQL精确查询</span><br>查库存 — SKU-FS001</button>
    </div>
    <div class="sidebar-section">
      <h3>💬 闲聊Agent (Chitchat → 兜底)</h3>
      <button class="test-case" onclick="test('你好呀，今天心情真好！')"><span class="agent-tag tag-chat">纯LLM·不走RAG</span><br>打招呼 — 心情好</button>
      <button class="test-case" onclick="test('谢谢你上次的推荐，特别好用！')"><span class="agent-tag tag-chat">纯LLM·不走RAG</span><br>感谢 — 推荐好用</button>
      <button class="test-case" onclick="test('再见啦，下次再来！')"><span class="agent-tag tag-chat">纯LLM·不走RAG</span><br>告别 — 快速模板</button>
    </div>
    <div class="sidebar-section">
      <h3>📝 知识收纳Agent (KnowledgeMgmt → 商户)</h3>
      <button class="test-case" onclick="test('帮我记一下：本店退货需在7天内申请，超期不受理，退货需保持吊牌完整')"><span class="agent-tag tag-mgmt">双写MySQL+向量库</span><br>添加知识 — 退货规则</button>
      <button class="test-case" onclick="test('上传规则：满199元包邮，生鲜类不支持无理由退货，偏远地区加收5元运费')"><span class="agent-tag tag-mgmt">双写MySQL+向量库</span><br>添加知识 — 运费规则</button>
      <button class="test-case" onclick="test('看看知识库有哪些内容')"><span class="agent-tag tag-mgmt">MySQL查询</span><br>查看知识 — 知识库摘要</button>
    </div>
  </div>

  <!-- ═══ 中间：聊天区 ═══ -->
  <div class="content">
    <div class="chat-area" id="chat"></div>
    <div class="input-area">
      <textarea id="input" rows="1" placeholder="输入消息测试各个Agent... 或点击左侧用例快速测试" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>

  <!-- ═══ 右侧：调试面板 ═══ -->
  <div class="debug-panel" id="debug">
    <div class="debug-header">🔍 实时调试面板</div>
    <div class="debug-empty" id="debugEmpty">点击左侧测试用例或发送消息<br>查看 Agent 全链路执行过程</div>
  </div>

</div>

<script>
let mode = 'normal';
let isStreaming = false;
let chatHistory = [];  // 🆕 多轮对话记忆

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(m === 'normal' ? '常规' : '流式')));
}

async function test(text) {
  document.getElementById('input').value = text;
  send();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Chat ──
function addMsg(role, content, tags) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  let tagsHtml = '';
  if (tags && tags.length) {
    tagsHtml = '<div class="meta">' + tags.map(t => {
      let cls = '';
      if (t.type === 'sentiment') cls = 'sent';
      else if (t.type === 'intent') cls = 'intent';
      else if (t.type === 'time') cls = 'time';
      else if (t.type === 'agent') cls = 'agent';
      return `<span class="meta-tag ${cls}">${esc(t.label)}</span>`;
    }).join('') + '</div>';
  }
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div>
      <div class="bubble">${esc(content).replace(/\n/g, '<br>')}</div>
      ${tagsHtml}
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function rmTyping() { const e = document.getElementById('typing'); if (e) e.remove(); }

// ── Debug Panel ──
function clearDebug() {
  const dbg = document.getElementById('debug');
  dbg.innerHTML = '<div class="debug-header">🔍 实时调试面板</div><div class="debug-empty" id="debugEmpty">等待请求...</div>';
}

function updateDebug(data) {
  const dbg = document.getElementById('debug');
  let html = '<div class="debug-header">🔍 实时调试面板</div>';

  // Step 1: API
  html += `<div class="debug-step">
    <div class="step-title"><span class="dot" style="background:var(--primary)"></span>请求信息</div>
    <div class="step-body">
      <div class="kv"><span class="k">模式</span><span>${data.mode}</span></div>
      <div class="kv"><span class="k">耗时</span><span style="color:var(--green)">${data.time_ms}ms</span></div>
    </div>
  </div>`;
  html += '<div class="debug-step"><div class="flow-arrow">↓ 感知层</div></div>';

  // Step 2: Perception
  if (data.perception) {
    const p = data.perception;
    const sentColor = p.sentiment === 'positive' ? 'var(--green)' : p.sentiment === 'negative' ? 'var(--red)' : 'var(--amber)';
    html += `<div class="debug-step">
      <div class="step-title"><span class="dot" style="background:#3b82f6"></span>感知Agent · PerceptionAgent</div>
      <div class="step-body">
        <div class="kv"><span class="k">情感极性</span><span style="color:${sentColor}">${p.sentiment}</span></div>
        <div class="kv"><span class="k">细粒度</span><span>${p.sentiment_label}</span></div>
        <div class="kv"><span class="k">置信度</span><span>${(p.confidence*100).toFixed(0)}%</span></div>
        <div class="kv"><span class="k">意图</span><span style="color:var(--cyan)">${p.intent}</span></div>
        <div class="kv"><span class="k">实体</span><span>${p.entities && p.entities.length ? p.entities.map(e=>e.type+':'+e.value).join(', ') : '(无)'}</span></div>
      </div>
    </div>`;
  }

  // Step 3: Dispatch
  html += '<div class="debug-step"><div class="flow-arrow">↓ 意图分发</div></div>';
  html += `<div class="debug-step">
    <div class="step-title"><span class="dot" style="background:var(--amber)"></span>路由决策 · RoutingAgent</div>
    <div class="step-body">
      <div class="kv"><span class="k">分发到</span><span style="color:${data.agent_color};font-weight:600">${data.agent_name}</span></div>
      <div class="kv"><span class="k">检索策略</span><span>${data.strategy || 'N/A'}</span></div>
      <div class="kv"><span class="k">转人工</span><span>${data.escalate ? '⚠️ 是' : '否'}</span></div>
      <div class="kv"><span class="k">跳过RAG</span><span>${data.skip_rag ? '是' : '否'}</span></div>
    </div>
  </div>`;

  // Step 4: Data source
  html += '<div class="debug-step"><div class="flow-arrow">↓ 数据源</div></div>';
  html += `<div class="debug-step">
    <div class="step-title"><span class="dot" style="background:var(--red)"></span>数据访问</div>
    <div class="step-body">
      <div class="kv"><span class="k">数据源</span><span>${data.datasource}</span></div>
      <div class="kv"><span class="k">检索文档</span><span>${data.doc_count !== undefined ? data.doc_count + ' 篇' : 'N/A'}</span></div>
    </div>
  </div>`;

  dbg.innerHTML = html;
}

// ── Send ──
async function send() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const query = input.value.trim();
  if (!query || isStreaming) return;

  isStreaming = true;
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMsg('user', query);
  clearDebug();

  if (mode === 'stream') {
    await sendStream(query);
  } else {
    await sendNormal(query);
  }

  isStreaming = false;
  btn.disabled = false;
  input.focus();
}

async function sendNormal(query) {
  const start = performance.now();
  addTyping();
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, user_id: 'test_user', session_id: 'test_session', history: chatHistory })
    });
    const data = await res.json();
    rmTyping();
    const elapsed = Math.round(performance.now() - start);

    if (data.success && data.message) {
      const m = data.message;
      const tags = [
        { type: 'sentiment', label: `🧠 ${m.sentiment_detected || ''}` },
        { type: 'intent', label: `🎯 ${m.intent_detected || ''}` },
        { type: 'time', label: `⚡ ${elapsed}ms` },
        { type: 'agent', label: getAgentFromIntent(m.intent_detected) },
      ].filter(t => t.label.replace(/[🧠🎯⚡]/g,'').trim());
      addMsg('ai', m.content, tags);

      // 🆕 更新对话历史
      chatHistory = (data.history_updated && data.history_updated.length > 0)
        ? data.history_updated
        : [...chatHistory, { question: query, answer: m.content }];
      if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);

      // Debug
      updateDebug({
        mode: '常规 POST /chat',
        time_ms: elapsed,
        perception: extractPerception(m),
        agent_name: getAgentFromIntent(m.intent_detected),
        agent_color: getAgentColor(m.intent_detected),
        strategy: '—',
        escalate: false,
        skip_rag: m.intent_detected === 'chitchat',
        datasource: getDatasource(m.intent_detected),
        doc_count: m.intent_detected === 'chitchat' ? 0 : undefined,
      });
    } else {
      addMsg('ai', '❌ 请求失败，请检查后端服务是否运行。');
    }
  } catch(e) {
    rmTyping();
    addMsg('ai', `❌ 网络错误: ${e.message}\n请确认 python main.py 已启动`);
  }
}

async function sendStream(query) {
  const start = performance.now();
  const aiDiv = addMsg('ai', '');
  const bubble = aiDiv.querySelector('.bubble');
  let fullText = '';
  let perceptionData = null;
  let routeData = null;

  try {
    const res = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, user_id: 'test_user', session_id: 'test_session', history: chatHistory })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.trim()) continue;
        if (line.startsWith('event: ')) {
          const evtType = line.slice(7).trim();
          // next line should be data
          continue;
        }
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          const evtLine = lines[lines.indexOf(line) - 1] || '';
          const evtType = evtLine.startsWith('event: ') ? evtLine.slice(7).trim() : 'token';

          if (evtType === 'token') {
            fullText += data;
            bubble.innerHTML = esc(fullText).replace(/\n/g, '<br>');
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
          } else if (evtType === 'perception') {
            try { perceptionData = JSON.parse(data); } catch(e) {}
          } else if (evtType === 'route') {
            try { routeData = JSON.parse(data); } catch(e) {}
          } else if (evtType === 'done') {
            const elapsed = Math.round(performance.now() - start);
            const intent = perceptionData?.intent || 'unknown';
            const tags = [
              { type: 'sentiment', label: `🧠 ${perceptionData?.sentiment || ''}` },
              { type: 'intent', label: `🎯 ${intent}` },
              { type: 'time', label: `⚡ ${elapsed}ms` },
              { type: 'agent', label: getAgentFromIntent(intent) },
            ];
            const metaDiv = aiDiv.querySelector('.meta') || document.createElement('div');
            metaDiv.className = 'meta';
            metaDiv.innerHTML = tags.map(t => `<span class="meta-tag">${esc(t.label)}</span>`).join('');
            if (!aiDiv.querySelector('.meta')) aiDiv.appendChild(metaDiv);

            updateDebug({
              mode: '流式 SSE /chat/stream',
              time_ms: elapsed,
              perception: perceptionData,
              agent_name: getAgentFromIntent(intent),
              agent_color: getAgentColor(intent),
              strategy: routeData?.strategy || '—',
              escalate: routeData?.escalate || false,
              skip_rag: routeData?.skip_rag || false,
              datasource: getDatasource(intent),
            });

            // 🆕 更新对话历史
            chatHistory = [...chatHistory, { question: query, answer: fullText }];
            if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);

          } else if (evtType === 'error') {
            fullText = `❌ 流式错误: ${data}`;
            bubble.innerHTML = esc(fullText);
          }
        }
      }
    }
  } catch(e) {
    bubble.innerHTML = esc(`❌ SSE连接失败: ${e.message}`);
  }
}

// ── Helpers ──
function getAgentFromIntent(intent) {
  if (!intent) return '未知';
  if (intent.includes('chitchat')) return '💬 闲聊Agent';
  if (intent.includes('knowledge_mgmt')) return '📝 知识收纳Agent';
  if (intent.includes('order_tracking') || intent.includes('modify_order') || intent.includes('business')) return '📦 业务查询Agent';
  return '📚 知识应答Agent';
}

function getAgentColor(intent) {
  if (!intent) return 'var(--text-muted)';
  if (intent.includes('chitchat')) return 'var(--purple)';
  if (intent.includes('knowledge_mgmt')) return 'var(--pink)';
  if (intent.includes('order_tracking') || intent.includes('modify_order') || intent.includes('business')) return 'var(--cyan)';
  return 'var(--green)';
}

function getDatasource(intent) {
  if (!intent) return '—';
  if (intent.includes('chitchat')) return '无（纯LLM对话）';
  if (intent.includes('knowledge_mgmt')) return 'MySQL + Milvus/Chroma（双写）';
  if (intent.includes('order_tracking') || intent.includes('modify_order') || intent.includes('business')) return 'MySQL（精确查询）';
  return 'Milvus/Chroma（语义检索）';
}

function extractPerception(msg) {
  // sentiment_detected format: "positive → happy"
  const sentPart = (msg.sentiment_detected || 'neutral → neutral').split(' → ');
  return {
    sentiment: sentPart[0] || 'neutral',
    sentiment_label: sentPart[1] || 'neutral',
    confidence: 0.85,
    intent: msg.intent_detected || 'unknown',
    entities: [],
  };
}

// Init
document.getElementById('input').focus();
