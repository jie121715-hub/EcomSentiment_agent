<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Agent 调试面板 · 电商智能问答系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC',sans-serif;background:#0f172a;color:#e2e8f0;display:flex;height:100vh}
.panel{width:420px;min-width:420px;background:#0b1120;border-right:1px solid #1e293b;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.main{flex:1;display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:20px}
.msg{margin-bottom:14px;padding:10px 14px;border-radius:10px;max-width:85%;line-height:1.6;font-size:13px}
.msg.user{background:#1e3a5f;margin-left:auto;color:#bfdbfe}
.msg.agent{background:#1a2332;border:1px solid #1e3b4f;color:#e2e8f0}
.msg .meta{font-size:10px;color:#64748b;margin-top:4px}
.input-bar{display:flex;padding:14px 20px;background:#0b1120;border-top:1px solid #1e293b;gap:10px}
.input-bar input{flex:1;padding:10px 14px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
.input-bar input:focus{border-color:#3b82f6}
.input-bar button{padding:10px 20px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:13px}
.input-bar button:hover{background:#2563eb}

/* Panel cards */
.trace{background:#1a2332;border:1px solid #1e3b4f;border-radius:8px;padding:10px 12px;font-size:11px;line-height:1.6;animation:slideIn .2s}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.trace-h{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.trace-row{display:flex;justify-content:space-between;color:#94a3b8;font-size:10px;margin:2px 0}
.trace-val{color:#cbd5e1;font-weight:600}
.detail{display:none;margin-top:6px;padding:8px;background:#0f172a;border-radius:6px;font-family:'Cascadia Code','Consolas',monospace;font-size:10px;color:#64748b;white-space:pre-wrap;max-height:120px;overflow-y:auto}
.trace:hover .detail{display:block}

.tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;margin:0 2px}
.t-perception{background:rgba(139,92,246,.2);color:#c4b5fd}.t-route{background:rgba(245,158,11,.2);color:#fcd34d}
.t-kqa{background:rgba(16,185,129,.2);color:#6ee7b7}.t-biz{background:rgba(59,130,246,.2);color:#93c5fd}
.t-km{background:rgba(249,115,22,.2);color:#fdba74}.t-esc{background:rgba(239,68,68,.2);color:#fca5a5}.t-err{background:rgba(239,68,68,.2);color:#fca5a5}

.panel-title{font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.panel-title button{font-size:10px;padding:3px 8px;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:4px;cursor:pointer}
#latency{font-size:22px;font-weight:800;text-align:center;padding:8px}
#latency.fast{color:#34d399}#latency.mid{color:#fbbf24}#latency.slow{color:#f87171}

.empty{text-align:center;color:#334155;font-size:12px;padding:40px 0}
</style>
</head>
<body>

<!-- 左侧调试面板 -->
<div class="panel" id="panel">
  <div class="panel-title">
    🔬 Agent 调试面板
    <button onclick="document.getElementById('panel').querySelectorAll('.trace').forEach(e=>e.remove());document.getElementById('latency').textContent='0ms';document.getElementById('latency').className=''">清空</button>
  </div>
  <div id="latency" style="color:#64748b">0ms</div>
  <div id="traces"><div class="empty">等待请求…<br><small>输入问题后观察 Agent 调用链</small></div></div>
</div>

<!-- 右侧对话区 -->
<div class="main">
  <div class="chat-area" id="chat">
    <div class="msg agent">
      👋 你好！我是电商智能客服。<br>
      试试问我：<br>
      • "vivo X200 Pro 拍照怎么样"<br>
      • "帮我查 JD20260708-001 的物流"<br>
      • "取消订单 JD20260708-021"<br>
      • "YT7629819150434"
    </div>
  </div>
  <div class="input-bar">
    <input id="input" placeholder="输入问题…" onkeydown="if(event.key==='Enter')send()" autofocus>
    <button onclick="send()">发送</button>
  </div>
</div>

<script>
// 会话记忆
let chatHistory = []
let currentQuery = ''
let currentResponse = ''

async function send(){
  const q=document.getElementById('input').value.trim();if(!q)return
  document.getElementById('input').value=''
  currentQuery = q
  currentResponse = ''

  const chat=document.getElementById('chat')
  chat.innerHTML+=`<div class="msg user">${q}</div>`
  const agentDiv=document.createElement('div');agentDiv.className='msg agent';agentDiv.textContent='…';chat.appendChild(agentDiv)
  chat.scrollTop=chat.scrollHeight

  document.getElementById('latency').textContent='0ms'
  document.getElementById('latency').className=''
  document.getElementById('traces').innerHTML=''

  const startTime=Date.now()

  try{
    const resp=await fetch('/chat/stream',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q,user_id:'debug_user',session_id:'debug',history:chatHistory})
    })
    const reader=resp.body.getReader(),decoder=new TextDecoder()
    let raw=''

    while(true){
      const{value,done}=await reader.read()
      if(done)break
      raw+=decoder.decode(value,{stream:true})

      // 解析完整 event/data 对
      while(true){
        const ei=raw.indexOf('event:')
        const di=raw.indexOf('data:',ei)
        if(ei===-1||di===-1)break
        const nextEi=raw.indexOf('\nevent:',di)
        const end=nextEi===-1?raw.length:nextEi

        const eventType=raw.slice(ei+6,raw.indexOf('\n',ei)).trim()
        const data=raw.slice(di+5,end).trim()
        raw=raw.slice(end)

        renderTrace(eventType,data)
      }
    }

  }catch(e){
    agentDiv.innerHTML=`<span style="color:#f87171">❌ ${e.message}</span>`
    addTrace('error','系统错误',e.message,'')
  }

  const elapsed=Date.now()-startTime
  const lat=document.getElementById('latency')
  lat.textContent=elapsed+'ms'
  lat.className=elapsed<1000?'fast':elapsed<3000?'mid':'slow'
}

function renderTrace(type,data){
  if(type==='token'){
    currentResponse += data
    const lastMsg=document.querySelector('#chat .msg.agent:last-child')
    if(lastMsg&&lastMsg.textContent==='…')lastMsg.textContent=''
    if(lastMsg)lastMsg.textContent=currentResponse
    document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight
    return
  }
  if(type==='done'){
    // 保存到对话历史（最多10轮）
    if(currentResponse){
      chatHistory.push({question: currentQuery, answer: currentResponse})
      if(chatHistory.length > 10) chatHistory = chatHistory.slice(-10)
    }
    const targetMap={
      'knowledge_qa':'📚 KnowledgeQAAgent (RAG+LLM)',
      'business':'📦 BusinessAgent (MySQL读写)',
      'knowledge_mgmt':'📝 KnowledgeMgmtAgent (双写)',
      'escalate':'🚨 Escalate (转人工)',
      'clarify':'💬 Router (反问澄清)',
    }
    const target=targetMap[data]||data
    addTrace('dispatch','🎯 分发执行',`目标Agent: ${target}`,'')
    return
  }
  if(type==='error'){
    addTrace('error','❌ 错误',data,'')
    return
  }
  if(type==='perception'){
    try{
      const p=JSON.parse(data)
      addTrace('perception','🎯 PerceptionAgent · 感知层',
        `情感: ${p.sentiment} → ${p.sentiment_label} (置信度: ${(p.confidence*100).toFixed(0)}%)`+'\n'+
        `意图: ${p.intent}`+(p.entities?.length?`\n实体: ${JSON.stringify(p.entities)}`:'')
      ,JSON.stringify(p,null,2))
    }catch(e){}
    return
  }
  if(type==='route'){
    try{
      const r=JSON.parse(data)
      addTrace('route','🧠 RoutingAgent v3 · 路由决策',
        `目标: ${r.target_agent} | 紧急度: ${r.urgency}`+
        (r.escalate?'\n⚠️ 转人工: '+r.escalate:'')+
        (r.clarify?'\n💬 反问澄清':'\n策略: '+r.strategy)+(r.skip_rag?'\n⏭️ 跳过RAG':'')
      ,JSON.stringify(r,null,2))
    }catch(e){}
    return
  }
}

function addTrace(type,title,summary,detail){
  const iconMap={perception:'🎯',route:'🧠',dispatch:'🎯',error:'❌'}
  const clsMap={perception:'t-perception',route:'t-route',dispatch:'t-kqa',error:'t-err'}

  const traces=document.getElementById('traces')
  if(traces.querySelector('.empty'))traces.innerHTML=''

  const div=document.createElement('div');div.className='trace'
  div.innerHTML=`
    <div class="trace-h">${iconMap[type]||'📍'} ${title}</div>
    <div style="white-space:pre-wrap;font-size:10px;color:#cbd5e1;margin:4px 0">${summary}</div>
    ${detail?`<div class="detail">${detail}</div>`:''}
    <div style="font-size:9px;color:#334155;margin-top:4px">${new Date().toLocaleTimeString()}</div>
  `
  traces.prepend(div)
  traces.scrollTop=0
}

</script>
</body>
</html>
